##
## Nginx reverse proxy for FastAPI backend running on GCP Ubuntu VM.
## This config forwards all /api requests to uvicorn on port 8000.
##
## Install: sudo cp this file to /etc/nginx/sites-available/voto-peru
##          sudo ln -s /etc/nginx/sites-available/voto-peru /etc/nginx/sites-enabled/
##          sudo nginx -t && sudo systemctl reload nginx
##

server {
    listen 80;
    server_name _;   # Replace _ with your domain or VM IP

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Limit request body size - votes are small
    client_max_body_size 64k;

    # Rate limit zone (1000 req/min per IP)
    # Define this in /etc/nginx/nginx.conf http block:
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Proxy all /api calls to FastAPI
    location /api/ {
        # limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/api/health;
    }

    # Block common attack paths
    location ~* \.(php|asp|aspx|jsp)$ {
        return 404;
    }
}

## For HTTPS with Let's Encrypt, run:
## sudo apt install certbot python3-certbot-nginx
## sudo certbot --nginx -d yourdomain.com
