##
## Docker Compose for local development.
## Run: docker compose up --build
##
## For production on GCP, use the systemd + nginx approach described in docs/DEPLOY.md
## since a single-VM setup does not need Docker overhead.
##

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voto-peru-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database file across restarts
      - sqlite_data:/app/data
    environment:
      - APP_ENV=development
      - DATABASE_URL=sqlite+aiosqlite:////app/data/voto_peru.db
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voto-peru-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
